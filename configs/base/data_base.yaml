# Base data pipeline configuration.
# All experiment configs inherit these defaults via _base_.

data:
  data_root: $SENSORLLM_DATA_ROOT
  sensors:
    - vibration
  window_size: 4096          # samples per window (~10s at 400Hz)
  hop_size: 2048             # 50% overlap between windows
  n_channels: 1              # number of sensor input channels
  batch_size: 32
  num_workers: 4
  pin_memory: true
  augment: false             # enable noise augmentation for Stage 2 training
