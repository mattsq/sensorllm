# Base model configuration.
# Encoder-specific fields are overridden by individual experiment configs.

model:
  encoder:
    name: transformer          # default encoder; override per experiment
    in_channels: 1             # must match data.n_channels
    patch_size: 64             # samples per temporal patch → N = window_size / patch_size
    d_model: 256
    n_heads: 4
    n_layers: 4
    dropout: 0.1
    freeze: false              # time-series encoders train from scratch
  adapter:
    name: linear_projection    # overridden by adapter configs
    n_output_tokens: 32
    hidden_dim: 256
    n_layers: 2
    n_heads: 4
  llm:
    name: meta-llama/Llama-3.2-1B-Instruct
    torch_dtype: bfloat16
    device_map: auto
    freeze: true
    lora:
      enabled: false
      r: 16
      alpha: 32.0
      dropout: 0.05
      target_modules:
        - q_proj
        - v_proj
        - k_proj
        - o_proj
  sensor_token_id: 32000       # <sensor> token ID in tokenizer vocabulary
