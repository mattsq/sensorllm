# Experiment 003: Perceiver Resampler Adapter + ResNet-50 Encoder (Stage 1)
#
# Perceiver Resampler (Flamingo style) with ResNet-50 feature extractor.
# Tests whether spatial CNN features + latent cross-attention outperforms
# ViT patch tokens + Q-Former on vibration sensor spectrograms.

_base_:
  - configs/base/data_base.yaml
  - configs/base/model_base.yaml
  - configs/base/training_base.yaml
  - configs/adapters/perceiver.yaml

experiment_name: exp003_perceiver_resnet

seed: 42

data:
  sensors:
    - vibration
  transform: spectrogram
  image_size: 224
  batch_size: 16              # Perceiver uses more memory; smaller batch

model:
  encoder:
    name: resnet50
    pretrained: true
    freeze: true
    feature_layer: layer4
  llm:
    name: meta-llama/Llama-3.2-1B-Instruct
    freeze: true
    lora:
      enabled: false

training:
  stage: 1
  max_steps: 10000
  learning_rate: 5.0e-5
  warmup_steps: 500
  gradient_accumulation_steps: 8    # compensate for smaller batch
  bf16: true
  save_steps: 1000
  eval_steps: 500
  logging_steps: 50
