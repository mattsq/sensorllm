# Experiment 002: Q-Former Adapter + ViT-B/16 Encoder (Stage 1)
#
# Q-Former (BLIP-2 style) adapter with ViT-B/16 encoder. Learnable query tokens
# cross-attend to patch embeddings for selective feature extraction.
# Same encoder and data config as exp001 for fair comparison.

_base_:
  - configs/base/data_base.yaml
  - configs/base/model_base.yaml
  - configs/base/training_base.yaml
  - configs/adapters/qformer.yaml

experiment_name: exp002_qformer_vit

seed: 42

data:
  sensors:
    - vibration
  transform: spectrogram
  image_size: 224
  batch_size: 32

model:
  encoder:
    name: vit_b16
    pretrained: google/vit-base-patch16-224
    freeze: true
  llm:
    name: meta-llama/Llama-3.2-1B-Instruct
    freeze: true
    lora:
      enabled: false

training:
  stage: 1
  max_steps: 10000
  warmup_steps: 500
  gradient_accumulation_steps: 4
  bf16: true
  save_steps: 1000
  eval_steps: 500
  logging_steps: 50
