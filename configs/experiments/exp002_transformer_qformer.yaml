# Experiment 002: Transformer Encoder + Q-Former Adapter
#
# Temporal patch Transformer encodes sensor time-series into 64 patch embeddings
# (4096 samples / 64 patch_size). Q-Former with learnable queries selectively
# attends to these patches, compressing to 32 LLM tokens.
#
# Tests whether attention-based temporal encoding + selective query extraction
# outperforms the CNN1D + linear projection baseline.

_base_:
  - configs/base/data_base.yaml
  - configs/base/model_base.yaml
  - configs/base/training_base.yaml
  - configs/adapters/qformer.yaml

experiment_name: exp002_transformer_qformer

seed: 42

data:
  sensors:
    - vibration
  window_size: 4096
  hop_size: 2048
  n_channels: 1
  batch_size: 32

model:
  encoder:
    name: transformer
    in_channels: 1
    patch_size: 64            # N_patches = 4096 / 64 = 64
    d_model: 256
    n_heads: 4
    n_layers: 4
    dropout: 0.1
    freeze: false
  llm:
    name: meta-llama/Llama-3.2-1B-Instruct
    freeze: true
    lora:
      enabled: false

training:
  stage: 1
  max_steps: 10000
  learning_rate: 1.0e-4
  warmup_steps: 500
  gradient_accumulation_steps: 4
  bf16: true
  save_steps: 1000
  eval_steps: 500
  logging_steps: 50
