# Experiment 001: Linear Projection Adapter + ViT-B/16 Encoder (Stage 1 Baseline)
#
# Baseline experiment using the simplest adapter (two-layer MLP + avg pool) with
# a pretrained ViT-B/16 encoder. Mel spectrogram transform. Stage 1 alignment.
#
# Purpose: Establish baseline performance. All future experiments compare against this.

_base_:
  - configs/base/data_base.yaml
  - configs/base/model_base.yaml
  - configs/base/training_base.yaml
  - configs/adapters/linear_projection.yaml

experiment_name: exp001_linear_proj_vit

seed: 42

data:
  sensors:
    - vibration
  transform: spectrogram
  window_size: 4096
  hop_size: 2048
  image_size: 224
  batch_size: 32

model:
  encoder:
    name: vit_b16
    pretrained: google/vit-base-patch16-224
    freeze: true
  adapter:
    name: linear_projection
    n_output_tokens: 32
    hidden_dim: 768
  llm:
    name: meta-llama/Llama-3.2-1B-Instruct
    freeze: true
    lora:
      enabled: false

training:
  stage: 1
  max_steps: 10000
  learning_rate: 1.0e-4
  warmup_steps: 500
  gradient_accumulation_steps: 4
  bf16: true
  save_steps: 1000
  eval_steps: 500
  logging_steps: 50
