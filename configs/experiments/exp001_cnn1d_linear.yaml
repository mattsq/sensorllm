# Experiment 001: CNN1D Encoder + Linear Projection Adapter (Baseline)
#
# Simplest baseline: dilated 1D CNN encodes raw sensor time-series directly
# into temporal patch embeddings, which a two-layer MLP adapter projects into
# LLM token space. No image transform involved.
#
# Purpose: Establish baseline performance. All future experiments compare against this.

_base_:
  - configs/base/data_base.yaml
  - configs/base/model_base.yaml
  - configs/base/training_base.yaml
  - configs/adapters/linear_projection.yaml

experiment_name: exp001_cnn1d_linear

seed: 42

data:
  sensors:
    - vibration
  window_size: 4096
  hop_size: 2048
  n_channels: 1
  batch_size: 32

model:
  encoder:
    name: cnn1d
    in_channels: 1
    hidden_dim: 256
    n_res_blocks: 2
    n_stride_layers: 4        # output N = 4096 / 4^4 = 16 patches
    kernel_size: 7
    stride: 4
    dilation_base: 2
    freeze: false
  adapter:
    name: linear_projection
    n_output_tokens: 32
    hidden_dim: 256
  llm:
    name: meta-llama/Llama-3.2-1B-Instruct
    freeze: true
    lora:
      enabled: false

training:
  stage: 1
  max_steps: 10000
  learning_rate: 1.0e-4
  warmup_steps: 500
  gradient_accumulation_steps: 4
  bf16: true
  save_steps: 1000
  eval_steps: 500
  logging_steps: 50
