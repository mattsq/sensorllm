# Q-Former adapter hyperparameters (BLIP-2 style).
# Learnable query tokens + transformer cross-attention to sensor embeddings.

model:
  adapter:
    name: qformer
    n_output_tokens: 32        # number of learnable query tokens
    hidden_dim: 768            # Q-Former hidden dimension (qformer_hidden_dim)
    n_layers: 6                # number of transformer decoder layers
    n_heads: 8                 # attention heads
    dropout: 0.0

training:
  learning_rate: 1.0e-4        # Q-Former benefits from slightly higher LR than perceiver
